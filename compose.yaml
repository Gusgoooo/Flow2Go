services:
  # Backend API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - flow2go_data:/app/data
    restart: unless-stopped

  # Production frontend (nginx)
  flow2go-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001

  # Development frontend
  flow2go-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - flow2go_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  flow2go_node_modules: {}
  flow2go_data: {}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 同源反代 Routify OpenAI 兼容网关，避免浏览器 CORS / Mixed Content
  # 前端会请求 /protocol/openai/v1/*，此处转发到 routify.alibaba-inc.com
  location /protocol/openai/v1/ {
    proxy_pass http://routify.alibaba-inc.com/protocol/openai/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host routify.alibaba-inc.com;
    proxy_set_header Connection "";
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Accept $http_accept;
    proxy_set_header Origin "";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

